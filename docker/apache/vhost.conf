<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options +FollowSymLinks -Indexes
    </Directory>

    # Ensure writable directories are accessible
    <Directory /var/www/html/user_images>
        Require all granted
    </Directory>
    <Directory /var/www/html/user_docs>
        Require all granted
    </Directory>
    <Directory /var/www/html/user_temp>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
