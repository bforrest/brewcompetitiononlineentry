<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # OpenTelemetry (Task 12) - deliberately scoped to real Apache/mod_php
    # HTTP requests via SetEnv, NOT set container-wide in docker-compose.yml.
    # `docker compose exec web vendor/bin/phpunit`/`phpstan` run as separate
    # processes outside Apache and never see these, so tracing never
    # activates for CLI/test runs - no OTLP export noise, no per-process
    # BatchSpanProcessor flush delay in the test suite. This is the SAME
    # no-op-by-absence story a shared-hosting deploy gets automatically (its
    # .htaccess/vhost has none of this, and it won't have the native
    # ext-opentelemetry extension installed either - see the Dockerfile and
    # container.php's `tracer` definition, which falls back to the OTel API's
    # own no-op TracerProvider whenever the SDK's autoloader never activates).
    SetEnv OTEL_PHP_AUTOLOAD_ENABLED true
    SetEnv OTEL_SERVICE_NAME bcoem-web
    SetEnv OTEL_TRACES_EXPORTER otlp
    SetEnv OTEL_METRICS_EXPORTER none
    SetEnv OTEL_LOGS_EXPORTER none
    SetEnv OTEL_EXPORTER_OTLP_ENDPOINT http://jaeger:4318
    SetEnv OTEL_EXPORTER_OTLP_PROTOCOL http/protobuf
    SetEnv OTEL_PROPAGATORS tracecontext,baggage
</VirtualHost>
