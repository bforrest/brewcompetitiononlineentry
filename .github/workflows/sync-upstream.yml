name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 * * * *'  # every hour (adjust as needed)
  workflow_dispatch:      # allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # IMPORTANT: full history for tags

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/geoffhumphrey/brewcompetitiononlineentry.git
          git fetch upstream --tags --prune

      - name: Sync branches
        run: |
          git checkout main || git checkout master
          git merge upstream/main || git merge upstream/master

      - name: Push changes
        run: |
          git push origin HEAD

      - name: Push tags
        run: |
          git push origin --tags
