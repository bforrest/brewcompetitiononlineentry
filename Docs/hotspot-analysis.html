  body {

  header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid #1e2533;
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
    color: #f0f4f8;
    letter-spacing: -0.01em;
  }
  header p {
    font-size: 0.82rem;
    color: #6b7a96;
    margin-top: 5px;
    max-width: 700px;
    line-height: 1.5;
  }

  .layout {
    display: flex;
    height: calc(100vh - 100px);
  }

  .sidebar {
    width: 280px;
    flex-shrink: 0;
    padding: 20px;
    border-right: 1px solid #1e2533;
    overflow-y: auto;
  }

  .sidebar h2 {
    font-size: 0.7rem;
    font-weight: 600;
    color: #6b7a96;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }

  .filter-group {
    margin-bottom: 24px;
  }

  .filter-group label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: #a8b4c8;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.15s;
  }
  .filter-group label:hover { color: #e2e8f0; }

  .color-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .filter-group input[type="checkbox"] {
    display: none;
  }
  .filter-group input[type="checkbox"]:checked + .color-dot {
    box-shadow: 0 0 0 2px #0f1117, 0 0 0 3px currentColor;
  }

  .slider-row {
    margin-bottom: 14px;
  }
  .slider-row label {
    font-size: 0.78rem;
    color: #6b7a96;
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .slider-row label span { color: #a8b4c8; }
  input[type="range"] {
    width: 100%;
    accent-color: #5a8dee;
  }

  .top-list {
    margin-top: 0;
  }
  .top-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    margin-bottom: 2px;
  }
  .top-item:hover { background: #1a2235; }
  .top-item.active { background: #1e2d4a; }
  .top-item-rank {
    font-size: 0.65rem;
    color: #4a5a78;
    font-weight: 600;
    width: 18px;
    display: inline-block;
  }
  .top-item-name {
    font-size: 0.78rem;
    color: #a8b4c8;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }
  .top-item-score {
    font-size: 0.68rem;
    color: #4a5a78;
    margin-top: 1px;
  }

  .chart-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg { width: 100%; height: 100%; }

  .axis text { fill: #4a5a78; font-size: 11px; }
  .axis path, .axis line { stroke: #1e2533; }
  .axis-label { fill: #6b7a96; font-size: 12px; }
  .grid line { stroke: #1a2235; stroke-dasharray: 3,3; }

  .bubble {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .bubble:hover { opacity: 1 !important; }

  .label-text {
    font-size: 10px;
    fill: #c8d4e8;
    pointer-events: none;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .tooltip {
    position: absolute;
    background: #1a2235;
    border: 1px solid #2a3a55;
    border-radius: 8px;
    padding: 12px 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    max-width: 280px;
    z-index: 10;
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-path {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 0.78rem;
    color: #7aa2f7;
    margin-bottom: 8px;
    word-break: break-all;
  }
  .tooltip-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.76rem;
    color: #6b7a96;
    margin-bottom: 3px;
  }
  .tooltip-row span:last-child { color: #c8d4e8; font-weight: 500; }
  .tooltip-hotspot {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid #2a3a55;
    font-size: 0.78rem;
    color: #6b7a96;
  }
  .tooltip-hotspot strong { font-size: 1rem; }

  .legend {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(15,17,23,0.85);
    border: 1px solid #1e2533;
    border-radius: 8px;
    padding: 12px 16px;
  }
  .legend h4 {
    font-size: 0.68rem;
    color: #6b7a96;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
  }
  .legend-gradient {
    width: 160px; height: 10px;
    border-radius: 5px;
    background: linear-gradient(to right, #1a4a8a, #5a8dee, #f6c90e, #ff6b35, #e63946);
    margin-bottom: 4px;
  }
  .legend-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.65rem;
    color: #4a5a78;
  }
  .legend-size {
    margin-top: 10px;
    font-size: 0.68rem;
    color: #4a5a78;
  }

  .zone-label {
    font-size: 10px;
    fill: #2a3a55;
    font-style: italic;
    pointer-events: none;
  }
</style>

<header>
  <h1>BCOE&amp;M — Code Hotspot Analysis</h1>
  <p>Bubble position = change frequency (X) × cyclomatic complexity (Y). Bubble size = lines of code.

</header>

</div>

  const dot = document.createElement('span');
  dot.className = 'color-dot';
  dot.style.background = layer.color;
  const txt = document.createTextNode(layer.label);
  wrapper.appendChild(cb);
  wrapper.appendChild(dot);
  wrapper.appendChild(txt);
  filterContainer.appendChild(wrapper);
});

// Slider
const slider = document.getElementById('n-slider');
const nLabel = document.getElementById('n-label');
slider.addEventListener('input', () => {
  activeN = +slider.value;
  nLabel.textContent = activeN;
  render();
});

// Top list
function buildTopList() {
  const container = document.getElementById('top-list');
  container.innerHTML = '';
  const top15 = RAW_DATA.slice(0, 15);
  top15.forEach((d, i) => {
    const item = document.createElement('div');
    item.className = 'top-item' + (highlightedPath === d.path ? ' active' : '');
    item.dataset.path = d.path;
    item.innerHTML = `
      <span class="top-item-rank">#${i+1}</span>
      <span class="top-item-name">${d.path}</span>
      <div class="top-item-score">score ${d.hotspot.toFixed(3)} · ${d.churn} commits · ${d.loc} LOC</div>
    `;
    item.addEventListener('click', () => {
      highlightedPath = highlightedPath === d.path ? null : d.path;
      buildTopList();
      render();
    });
    container.appendChild(item);
  });
}

// --- D3 Chart ---
const chartArea = document.getElementById('chart-area');
const tooltip = document.getElementById('tooltip');
const svg = d3.select('#chart-area').append('svg');

const margin = { top: 30, right: 30, bottom: 60, left: 70 };

function render() {
  const W = chartArea.clientWidth;
  const H = chartArea.clientHeight;
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  svg.attr('width', W).attr('height', H);
  svg.selectAll('*').remove();

  const visibleData = RAW_DATA
    .slice(0, activeN)
    .filter(d => activeFilters.has(getLayer(d.path).key));

  const xMax = d3.max(visibleData, d => d.churn) * 1.08;
  const yMax = d3.max(visibleData, d => d.complexity) * 1.1;

  const xScale = d3.scaleLinear().domain([0, xMax]).range([0, w]).nice();
  const yScale = d3.scaleLinear().domain([0, yMax]).range([h, 0]).nice();
  const rScale = d3.scaleSqrt()
    .domain([0, d3.max(visibleData, d => d.loc)])
    .range([4, 38]);

  const colorScale = d3.scaleSequential()
    .domain([0, 1])
    .interpolator(d3.interpolateRgbBasis(['#1a4a8a','#5a8dee','#f6c90e','#ff6b35','#e63946']));

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  // Grid
  const xGrid = g.append('g').attr('class', 'grid').attr('transform', `translate(0,${h})`);
  xGrid.call(d3.axisBottom(xScale).tickSize(-h).tickFormat(''));
  const yGrid = g.append('g').attr('class', 'grid');
  yGrid.call(d3.axisLeft(yScale).tickSize(-w).tickFormat(''));

  // Quadrant zone labels
  const midX = xScale(xMax * 0.5);
  const midY = yScale(yMax * 0.5);
  g.append('text').attr('class','zone-label').attr('x', midX * 0.3).attr('y', midY * 0.5)
    .text('STABLE — low risk');
  g.append('text').attr('class','zone-label').attr('x', midX * 1.5).attr('y', midY * 0.5)
    .text('COMPLEX & CHURNING → highest risk');
  g.append('text').attr('class','zone-label').attr('x', midX * 0.2).attr('y', midY * 1.6)
    .text('RARELY CHANGED');
  g.append('text').attr('class','zone-label').attr('x', midX * 1.4).attr('y', h - 8)
    .text('FREQUENTLY CHANGED, SIMPLE');

  // Quadrant dividers
  g.append('line').attr('x1', midX).attr('x2', midX).attr('y1', 0).attr('y2', h)
    .attr('stroke', '#1e2d4a').attr('stroke-dasharray', '6,4');
  g.append('line').attr('x1', 0).attr('x2', w).attr('y1', midY).attr('y2', midY)
    .attr('stroke', '#1e2d4a').attr('stroke-dasharray', '6,4');

  // Axes
  g.append('g').attr('class','axis').attr('transform', `translate(0,${h})`).call(d3.axisBottom(xScale).ticks(8));
  g.append('g').attr('class','axis').call(d3.axisLeft(yScale).ticks(8));

  // Axis labels
  g.append('text').attr('class','axis-label')
    .attr('x', w / 2).attr('y', h + 48).attr('text-anchor', 'middle')
    .text('Change Frequency (commits touching file)');
  g.append('text').attr('class','axis-label')
    .attr('transform', 'rotate(-90)')
    .attr('x', -h / 2).attr('y', -54).attr('text-anchor', 'middle')
    .text('Cyclomatic Complexity (decision points)');

  // Sort so smaller bubbles render on top
  const sorted = [...visibleData].sort((a, b) => b.loc - a.loc);

  // Bubbles
  const circles = g.selectAll('.bubble')
    .data(sorted, d => d.path)
    .enter().append('circle')
    .attr('class', 'bubble')
    .attr('cx', d => xScale(d.churn))
    .attr('cy', d => yScale(d.complexity))
    .attr('r', d => rScale(d.loc))
    .attr('fill', d => colorScale(d.hotspot))
    .attr('fill-opacity', d => highlightedPath ? (d.path === highlightedPath ? 0.92 : 0.12) : 0.78)
    .attr('stroke', d => highlightedPath === d.path ? '#fff' : 'rgba(255,255,255,0.1)')
    .attr('stroke-width', d => highlightedPath === d.path ? 2 : 0.5)
    .on('mouseover', function(event, d) {
      d3.select(this).attr('fill-opacity', 1).attr('stroke', '#fff').attr('stroke-width', 2);
      showTooltip(event, d);
    })
    .on('mousemove', function(event, d) {
      moveTooltip(event);
    })
    .on('mouseout', function(event, d) {
      d3.select(this)
        .attr('fill-opacity', highlightedPath ? (d.path === highlightedPath ? 0.92 : 0.12) : 0.78)
        .attr('stroke', highlightedPath === d.path ? '#fff' : 'rgba(255,255,255,0.1)')
        .attr('stroke-width', highlightedPath === d.path ? 2 : 0.5);
      hideTooltip();
    })
    .on('click', function(event, d) {
      highlightedPath = highlightedPath === d.path ? null : d.path;
      buildTopList();
      render();
    });

  // Labels for top 12 hotspots
  const labelData = visibleData
    .slice()
    .sort((a,b) => b.hotspot - a.hotspot)
    .slice(0, 12);

  g.selectAll('.label-text')
    .data(labelData, d => d.path)
    .enter().append('text')
    .attr('class', 'label-text')
    .attr('x', d => xScale(d.churn) + rScale(d.loc) + 4)
    .attr('y', d => yScale(d.complexity) + 3)
    .attr('opacity', d => highlightedPath ? (d.path === highlightedPath ? 1 : 0.2) : 0.85)
    .text(d => d.path.split('/').pop().replace('.php',''));
}

function showTooltip(event, d) {
  const rank = RAW_DATA.indexOf(d) + 1;
  const hotPct = Math.round(d.hotspot * 100);
  tooltip.innerHTML = `
    <div class="tooltip-path">${d.path}</div>
    <div class="tooltip-row"><span>Commits (churn)</span><span>${d.churn}</span></div>
    <div class="tooltip-row"><span>Complexity score</span><span>${d.complexity}</span></div>
    <div class="tooltip-row"><span>Lines of code</span><span>${d.loc.toLocaleString()}</span></div>
    <div class="tooltip-hotspot">
      Hotspot score: <strong style="color:${d.hotspot > 0.5 ? '#e63946' : d.hotspot > 0.25 ? '#ff9f1c' : '#5a8dee'}">${hotPct}%</strong>
      &nbsp;·&nbsp; Rank #${rank} of ${RAW_DATA.length}
    </div>
  `;
  moveTooltip(event);
  tooltip.classList.add('visible');
}

function moveTooltip(event) {
  const rect = chartArea.getBoundingClientRect();
  let x = event.clientX - rect.left + 14;
  let y = event.clientY - rect.top - 10;
  if (x + 290 > chartArea.clientWidth) x -= 300;
  if (y + 160 > chartArea.clientHeight) y -= 160;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// Legend
const legendEl = document.createElement('div');
legendEl.className = 'legend';
legendEl.innerHTML = `
  <h4>Hotspot Score</h4>
  <div class="legend-gradient"></div>
  <div class="legend-labels"><span>Low</span><span>High</span></div>
  <div class="legend-size">● Bubble size = Lines of Code</div>
`;
chartArea.appendChild(legendEl);

// Init
buildTopList();
render();
window.addEventListener('resize', render);
</script>
</body>
</html>
