services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      # Override .htaccess to disable the HTTPS redirect for local dev
      - ./docker/.htaccess:/var/www/html/.htaccess:ro
    depends_on:
      db:
        condition: service_healthy
      jaeger:
        condition: service_started
    environment:
      # Task 13: site/config.php reads these directly (getenv(...) ?: '<shared-hosting
      # default>') - Docker is now just another consumer of that single file via real
      # environment variables, not a bind-mounted override of it (docker/config.php,
      # retired by this task). A shared-hosting install with none of these set falls
      # through to config.php's own hardcoded literals, unchanged.
      DB_HOST: db
      DB_USER: bcoem
      DB_PASSWORD: bcoem_password
      DB_NAME: bcoem
      DB_PREFIX: baseline_
      INSTALLATION_ID: docker-local
      # SERVER_NAME inside the container reflects Apache's own idea of itself
      # (port 80), not the host port docker-compose maps it to (8080) - see
      # config.php's own comment on this flag for the full explanation.
      BASE_URL_USE_HTTP_HOST: "true"
      # Dev-friendly default: shows in-browser error details (Slim's
      # ErrorMiddleware/ErrorHandler, Task 11) instead of the production
      # behavior of logging only. Shared hosting never sets this, so it
      # stays off there.
      APP_DEBUG: "1"

  # Task 12: local trace viewer. jaeger-all-in-one has ingested OTLP natively
  # since ~1.35, so a single container covers both collection and the UI -
  # no separate otel-collector hop needed for "one trace visible locally".
  # docker/apache/vhost.conf points OTEL_EXPORTER_OTLP_ENDPOINT at
  # http://jaeger:4318 (the Docker-network service name; port 4318 is OTLP
  # over HTTP, matching OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf - deliberately
  # not the grpc port/transport, to avoid needing the much heavier grpc PECL
  # extension in the Dockerfile just for local dev tracing).
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318"   # OTLP HTTP receiver

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: bcoem
      MARIADB_USER: bcoem
      MARIADB_PASSWORD: bcoem_password
    volumes:
      - bcoem_db:/var/lib/mysql
      # Load the baseline schema on first run (only applied when data volume is empty)
      - ./sql/bcoem_baseline_3.0.X.sql:/docker-entrypoint-initdb.d/01-baseline.sql:ro
      # Push the baseline's 2023 contest deadlines into the future so registration/entry are open
      - ./docker/02-open-registration.sql:/docker-entrypoint-initdb.d/02-open-registration.sql:ro
      # E2E test fixtures: pin prefsCAPTCHA=0 so automated registration works (see file header)
      - ./docker/03-e2e-fixtures.sql:/docker-entrypoint-initdb.d/03-e2e-fixtures.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - "3306:3306"

volumes:
  bcoem_db:
  