version: '3.8'
services:
  reverseproxy:
    image: nginx
    container_name: reverseproxy
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    restart: always
    depends_on:
      - php-apache
      - phpmyadmin

  php-apache:
    container_name: bcoem
    build:
      context: ./
    depends_on:
      - db
    volumes:
      - ./:/var/www/html
    restart: always

  db:
    container_name: db
    image: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: BBO2022_ROOT_PASSWORD
      MYSQL_DATABASE: BBO2022_DATABASE
      MYSQL_USER: BBO2022_USER
      MYSQL_PASSWORD: BBO2022_PASSWORD
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "9906:3306"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
    depends_on:
      - db